<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nebula Bot — Session Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; background: #000;
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden; display: flex;
      flex-direction: column; align-items: center;
    }
    .stars {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(80,0,120,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(180,0,50,0.12) 0%, transparent 50%),
        #000;
    }
    .stars::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, white 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,200,255,0.8) 0%, transparent 100%),
        radial-gradient(2px 2px at 50% 10%, white 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 60%, rgba(255,150,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 30%, white 0%, transparent 100%),
        radial-gradient(2px 2px at 15% 70%, rgba(200,150,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 85%, white 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 90%, rgba(255,150,200,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 55%, white 0%, transparent 100%),
        radial-gradient(2px 2px at 62% 22%, rgba(200,200,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  45%, white 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 75%, white 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 95%, rgba(180,100,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 5%,  white 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 45%, rgba(255,200,150,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 8%  25%, white 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 70%, white 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 35%, rgba(150,100,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 15%, white 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 90%, rgba(255,150,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 55%, white 0%, transparent 100%),
        radial-gradient(2px 2px at 3%  80%, rgba(255,200,200,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 8%,  white 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 65%, white 0%, transparent 100%);
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    @keyframes twinkle { 0%{opacity:0.4} 100%{opacity:1} }

    .nebula-glow {
      position: fixed; z-index: 0;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(100,0,180,0.1) 0%, rgba(255,0,60,0.05) 40%, transparent 70%);
      top: -80px; left: 50%; transform: translateX(-50%);
      pointer-events: none;
      animation: nebula-drift 8s ease-in-out infinite;
    }
    @keyframes nebula-drift {
      0%,100%{transform:translateX(-50%) scale(1)}
      50%{transform:translateX(-50%) scale(1.15)}
    }

    /* ── Anneau ── */
    .ring-wrap {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      width: 220px; height: 220px; margin-top: 40px;
    }
    .ring {
      position: absolute; border-radius: 50%;
      border: 2px solid transparent;
    }
    .ring-1 {
      width: 200px; height: 200px;
      border-top-color: #ff003c;
      border-right-color: rgba(255,0,60,0.2);
      animation: spin 3s linear infinite;
      filter: drop-shadow(0 0 8px #ff003c);
    }
    .ring-2 {
      width: 168px; height: 168px;
      border-top-color: #9b00ff;
      border-left-color: rgba(155,0,255,0.3);
      animation: spin 2s linear infinite reverse;
      filter: drop-shadow(0 0 8px #9b00ff);
    }
    .ring-3 {
      width: 136px; height: 136px;
      border-bottom-color: #ff003c;
      border-right-color: rgba(255,0,60,0.2);
      animation: spin 4s linear infinite;
      filter: drop-shadow(0 0 6px #ff003c);
    }
    .ring-4 {
      width: 104px; height: 104px;
      border-top-color: #cc00ff;
      border-left-color: rgba(200,0,255,0.2);
      animation: spin 1.5s linear infinite reverse;
      filter: drop-shadow(0 0 6px #cc00ff);
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    .ring-core {
      width: 66px; height: 66px; border-radius: 50%;
      background: radial-gradient(circle, rgba(155,0,255,0.5), rgba(255,0,60,0.2), transparent);
      border: 1px solid rgba(200,100,255,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 0 30px rgba(155,0,255,0.5), 0 0 60px rgba(255,0,60,0.2);
      animation: pulse-core 2s ease-in-out infinite;
    }
    @keyframes pulse-core {
      0%,100%{box-shadow:0 0 20px rgba(155,0,255,0.4),0 0 40px rgba(255,0,60,0.15)}
      50%{box-shadow:0 0 40px rgba(155,0,255,0.8),0 0 80px rgba(255,0,60,0.3)}
    }

    /* ── Header ── */
    .header { position:relative; z-index:1; text-align:center; margin-top:12px; }
    .title {
      font-family:'Orbitron',sans-serif; font-size:2.2rem; font-weight:900;
      letter-spacing:6px; text-transform:uppercase;
      background:linear-gradient(135deg,#ff003c,#cc00ff,#9b00ff);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      animation:title-glow 3s ease-in-out infinite;
    }
    @keyframes title-glow {
      0%,100%{filter:drop-shadow(0 0 8px rgba(155,0,255,0.4))}
      50%{filter:drop-shadow(0 0 20px rgba(255,0,60,0.7))}
    }
    .subtitle {
      font-size:0.8rem; letter-spacing:4px;
      color:rgba(200,150,255,0.6); text-transform:uppercase; margin-top:4px;
    }
    .divider {
      width:200px; height:1px; margin:14px auto;
      background:linear-gradient(90deg,transparent,#9b00ff,#ff003c,transparent);
    }

    /* ── Buttons ── */
    .buttons {
      position:relative; z-index:1;
      display:flex; flex-direction:column; align-items:center;
      gap:14px; margin-top:16px; padding:0 20px;
      width:100%; max-width:340px;
    }
    .btn {
      width:100%; padding:15px 18px;
      display:flex; align-items:center; justify-content:space-between;
      border-radius:12px; text-decoration:none;
      border:1px solid rgba(155,0,255,0.25);
      background:rgba(10,0,20,0.75);
      backdrop-filter:blur(10px);
      transition:all 0.3s ease; position:relative; overflow:hidden;
    }
    .btn::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(155,0,255,0.08),rgba(255,0,60,0.08));
      opacity:0; transition:opacity 0.3s;
    }
    .btn:hover::before{opacity:1}
    .btn:hover {
      border-color:rgba(255,0,60,0.5);
      box-shadow:0 0 20px rgba(155,0,255,0.25),0 0 40px rgba(255,0,60,0.1);
      transform:translateY(-2px);
    }
    .btn-left{display:flex;align-items:center;gap:14px}
    .btn-icon {
      width:42px; height:42px; border-radius:10px;
      display:flex; align-items:center; justify-content:center; font-size:20px;
    }
    .icon-pair{
      background:linear-gradient(135deg,rgba(155,0,255,0.25),rgba(100,0,200,0.15));
      border:1px solid rgba(155,0,255,0.35);
    }
    .icon-qr{
      background:linear-gradient(135deg,rgba(255,0,60,0.25),rgba(180,0,40,0.15));
      border:1px solid rgba(255,0,60,0.35);
    }
    .btn-title{
      font-family:'Orbitron',sans-serif; font-size:0.8rem;
      font-weight:700; letter-spacing:2px; color:#fff;
    }
    .btn-desc{font-size:0.72rem; color:rgba(200,150,255,0.55); margin-top:2px; letter-spacing:1px;}
    .btn-arrow{font-size:20px; color:rgba(200,100,255,0.4); transition:all 0.3s;}
    .btn:hover .btn-arrow{color:#ff003c; transform:translateX(4px);}

    /* ── Extra ── */
    .extra-links {
      position:relative; z-index:1;
      display:flex; gap:10px; margin-top:14px; flex-wrap:wrap;
      justify-content:center; padding:0 20px; max-width:340px; width:100%;
    }
    .link-small {
      flex:1; min-width:100px; padding:9px 12px; border-radius:8px;
      text-decoration:none; text-align:center; font-size:0.72rem;
      letter-spacing:2px; font-weight:600; text-transform:uppercase;
      border:1px solid rgba(255,0,60,0.2); background:rgba(5,0,10,0.7);
      color:rgba(200,150,255,0.7); transition:all 0.3s;
    }
    .link-small:hover{border-color:rgba(255,0,60,0.5);color:#ff003c;box-shadow:0 0 12px rgba(255,0,60,0.15)}

    footer {
      position:relative; z-index:1; margin-top:auto; padding:20px;
      text-align:center; font-size:0.72rem; letter-spacing:3px;
      color:rgba(150,80,200,0.45); text-transform:uppercase;
    }
    footer .hl{color:rgba(255,0,60,0.6)}
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="nebula-glow"></div>

  <div class="ring-wrap">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="ring ring-4"></div>
    <div class="ring-core">🌌</div>
  </div>

  <div class="header">
    <div class="title">Nebula Bot</div>
    <div class="subtitle">WhatsApp Session Generator</div>
    <div class="divider"></div>
  </div>

  <div class="buttons">
    <a href="/pair" class="btn">
      <div class="btn-left">
        <div class="btn-icon icon-pair">📱</div>
        <div>
          <div class="btn-title">Pair Code</div>
          <div class="btn-desc">Lier avec un numéro</div>
        </div>
      </div>
      <div class="btn-arrow">›</div>
    </a>
    <a href="/qr" class="btn">
      <div class="btn-left">
        <div class="btn-icon icon-qr">⬛</div>
        <div>
          <div class="btn-title">QR Code</div>
          <div class="btn-desc">Scanner avec WhatsApp</div>
        </div>
      </div>
      <div class="btn-arrow">›</div>
    </a>
  </div>

  <div class="extra-links">
    <a href="https://wa.me/237640143760" target="_blank" class="link-small">WhatsApp</a>
    <a href="https://t.me/Kitagawa_ayanokoji" target="_blank" class="link-small">Telegram</a>
    <a href="https://chat.whatsapp.com/EqrRF0FvlTWLcgJR91RfCA" target="_blank" class="link-small">Groupe</a>
  </div>

  <footer>
    Nebula Bot &copy; <span id="yr" class="hl"></span> &mdash; by <span class="hl">Dark Neon</span>
  </footer>
  <script>document.getElementById('yr').textContent=new Date().getFullYear()</script>
</body>
</html>
